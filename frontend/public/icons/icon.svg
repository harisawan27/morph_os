<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#08080f"/>

  <!-- Subtle bg glow -->
  <ellipse cx="256" cy="230" rx="160" ry="160" fill="url(#bg)" opacity="0.10" filter="url(#glow)"/>

  <!-- Ghost icon scaled & centered (original 24x24 → ~300px, centered in 512x512) -->
  <!-- scale=13, translate so ghost center (x=12,y=12 in original) maps to (256,245) in canvas -->
  <!-- translate = (256 - 12*13, 245 - 12*13) = (256-156, 245-156) = (100, 89) -->
  <g transform="translate(100, 89) scale(13)" stroke="url(#glow-g)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Ghost body -->
    <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/>
    <!-- Eyes -->
    <path d="M9 10h.01" stroke-width="2.5"/>
    <path d="M15 10h.01" stroke-width="2.5"/>
  </g>
</svg>
