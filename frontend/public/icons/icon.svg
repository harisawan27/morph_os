<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505"/>

  <!-- Gradient orb glow -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#bg)" opacity="0.12"/>
  <ellipse cx="256" cy="240" rx="100" ry="100" fill="url(#bg)" opacity="0.18" filter="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#bg)" stroke-width="1.5" opacity="0.35"/>

  <!-- Inner rounded square -->
  <rect x="128" y="128" width="256" height="256" rx="56" fill="url(#bg)" opacity="0.15"/>
  <rect x="128" y="128" width="256" height="256" rx="56" fill="none" stroke="url(#bg)" stroke-width="1.5" opacity="0.5"/>

  <!-- M letterform -->
  <text
    x="256" y="310"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="196"
    font-weight="200"
    text-anchor="middle"
    fill="url(#letter)"
    letter-spacing="-8"
  >M</text>

  <!-- Bottom label -->
  <text
    x="256" y="370"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="28"
    font-weight="300"
    text-anchor="middle"
    fill="#ffffff"
    opacity="0.28"
    letter-spacing="6"
  >OS</text>
</svg>
