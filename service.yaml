apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: morph-os
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        # Allow up to 4 concurrent requests per instance before scaling
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/morph-os:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
        env:
        # ── Auth ──
        - name: NEXTAUTH_URL
          valueFrom:
            secretKeyRef:
              name: morph-secrets
              key: NEXTAUTH_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: morph-secrets
              key: NEXTAUTH_SECRET
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: morph-secrets
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: morph-secrets
              key: GOOGLE_CLIENT_SECRET
        # ── Backend ──
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: morph-secrets
              key: DATABASE_URL
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: morph-secrets
              key: GEMINI_API_KEY
        # Same-origin in prod — no CORS needed, but keep for local dev override
        - name: ALLOWED_ORIGINS
          value: ""
